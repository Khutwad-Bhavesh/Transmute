name: transmute
description: Transmute — A free, offline, open-source file converter. No ads, no watermarks, no sign-in.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  file_picker: ^6.2.1
  shared_preferences: ^2.2.3
  path: ^1.9.0
  path_provider: ^2.1.3
  image: ^4.1.7
  pdf: ^3.10.8
  printing: ^5.12.0
  excel: ^4.0.2
  syncfusion_flutter_pdf: ^27.1.48
  ffmpeg_kit_flutter_audio: ^6.0.3   # ffmpeg compiled for Android (audio+video, no GPL)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/fonts/
