name: Build Transmute

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
      - run: sudo apt-get install -y libgtk-3-dev ninja-build clang cmake
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package Linux
        run: |
          cd build/linux/x64/release
          tar -czf Transmute-linux-x64.tar.gz bundle/
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/Transmute-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package Windows
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath Transmute-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: Transmute-windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package macOS
        run: |
          cd build/macos/Build/Products/Release
          zip -r Transmute-macos.zip Transmute.app
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/macos/Build/Products/Release/Transmute-macos.zip

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            linux-build/Transmute-linux-x64.tar.gz
            windows-build/Transmute-windows-x64.zip
            macos-build/Transmute-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}